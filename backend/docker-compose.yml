services:
  app:
    build: .
    container_name: donatellos_app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: donatellos_nginx
    ports:
      - "8010:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: donatellos_mysql
    environment:
      MYSQL_DATABASE: donatellos_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: donatellos_user
      MYSQL_PASSWORD: donatellos_pass
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: donatellos_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

volumes:
  mysql_data:

services:
  app:
    build: .
    container_name: donatellos_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: donatellos_nginx
    ports:
      - "8010:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: donatellos_mysql
    environment:
      MYSQL_DATABASE: donatellos_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: donatellos_user
      MYSQL_PASSWORD: donatellos_pass
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: donatellos_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  vendor_data:
